<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Recipe Builder - CMPT 272 A3</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <main class="container py-4">
            <h1 class="mb-3">Recipe Builder</h1>

            <div class="row g-3">
                <div class="col-lg-7">
                    <div class="card shadow-sm">
                        <div class="card-header">
                            <h2 class="h5 mb-0">Pantry</h2>
                            <p class="text-muted small mb-0">
                                Nutrition per 100g
                            </p>
                        </div>
                        <div class="table-responsive">
                            <table
                                class="table table-striped align-middle mb-0"
                            >
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Category</th>
                                        <th>Cal</th>
                                        <th>P</th>
                                        <th>C</th>
                                        <th>F</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="pantry-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="card shadow-sm mb-3">
                        <div class="card-header">
                            <h2 class="h5 mb-0">Current Recipe</h2>
                        </div>
                        <div class="table-responsive">
                            <table class="table align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th>Ingredient</th>
                                        <th>Grams</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="recipe-body"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-header d-flex justify-content-between">
                            <h2 class="h5 mb-0">Totals</h2>
                            <span class="text-muted small" id="recipe-meta"
                                >Regular · 0 item(s)</span
                            >
                        </div>
                        <div class="card-body">
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="total-box">
                                        <div class="small text-muted">
                                            Calories
                                        </div>
                                        <div
                                            id="total-calories"
                                            class="h4 mb-0"
                                        >
                                            0.0
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="total-box">
                                        <div class="small text-muted">
                                            Protein (g)
                                        </div>
                                        <div id="total-protein" class="h4 mb-0">
                                            0.0
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="total-box">
                                        <div class="small text-muted">
                                            Carbs (g)
                                        </div>
                                        <div id="total-carbs" class="h4 mb-0">
                                            0.0
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="total-box">
                                        <div class="small text-muted">
                                            Fat (g)
                                        </div>
                                        <div id="total-fat" class="h4 mb-0">
                                            0.0
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div id="warnings" class="mt-3"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mt-3">
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label for="recipe-name" class="form-label"
                                >Recipe Name</label
                            >
                            <input
                                id="recipe-name"
                                class="form-control"
                                placeholder="My Recipe"
                            />
                        </div>
                        <div class="col-md-3">
                            <label for="recipe-type" class="form-label"
                                >Recipe Type</label
                            >
                            <select id="recipe-type" class="form-select">
                                <option value="regular">Regular Recipe</option>
                                <option value="vegetarian">
                                    Vegetarian Recipe
                                </option>
                                <option value="highProtein">
                                    High Protein Recipe
                                </option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="load-select" class="form-label"
                                >Saved Recipes</label
                            >
                            <select id="load-select" class="form-select">
                                <option value="">
                                    -- select saved recipe --
                                </option>
                            </select>
                        </div>
                        <div class="col-md-2 d-grid">
                            <button
                                id="clear-btn"
                                class="btn btn-outline-secondary"
                            >
                                Clear Form
                            </button>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-3">
                        <button id="save-btn" class="btn btn-success px-4">
                            Save
                        </button>
                        <button id="load-btn" class="btn btn-warning px-4">
                            Load
                        </button>
                    </div>
                    <p id="status-msg" class="small text-muted mb-0 mt-2"></p>
                </div>
            </div>
        </main>

        <script type="module" src="./src/main.ts"></script>
    </body>
</html>
