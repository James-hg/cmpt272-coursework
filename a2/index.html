<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Catalog Viewer</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <header class="site-header">
            <div class="container-fluid header-inner">
                <div class="brand-wrap">
                    <img
                        src="assets/logo.png"
                        alt="Catalog logo"
                        class="brand-logo"
                    />
                    <div>
                        <p class="brand-eyebrow mb-0">CMPT 272</p>
                        <h1 class="brand-title mb-0">Catalog Viewer</h1>
                    </div>
                </div>
            </div>
        </header>

        <main class="container page-shell py-4 py-md-5">
            <section class="controls-panel p-3 p-md-4 mb-4">
                <h2 class="h4 mb-3">Upload and Explore</h2>
                <p class="text-muted mb-4">
                    Upload a catalog CSV to filter by type and genre, then sort
                    by year or rating.
                </p>

                <div id="statusAlert" class="d-none" role="alert"></div>

                <div class="row g-3 align-items-end">
                    <div class="col-12 col-lg-4">
                        <label for="csvFileInput" class="form-label"
                            >Catalog CSV file</label
                        >
                        <input
                            class="form-control"
                            type="file"
                            id="csvFileInput"
                            accept=".csv,text/csv"
                        />
                    </div>
                    <div class="col-6 col-md-4 col-lg-2">
                        <label for="typeFilter" class="form-label">Type</label>
                        <select class="form-select" id="typeFilter" disabled>
                            <option value="all">All types</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-4 col-lg-2">
                        <label for="genreFilter" class="form-label"
                            >Genre</label
                        >
                        <select class="form-select" id="genreFilter" disabled>
                            <option value="all">All genres</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4 col-lg-3">
                        <label for="sortOrder" class="form-label"
                            >Sort by</label
                        >
                        <select class="form-select" id="sortOrder" disabled>
                            <option value="year-desc">Year (Newest)</option>
                            <option value="year-asc">Year (Oldest)</option>
                            <option value="rating-desc">
                                Rating (High to Low)
                            </option>
                            <option value="rating-asc">
                                Rating (Low to High)
                            </option>
                        </select>
                    </div>
                    <div class="col-12 col-lg-1 d-grid">
                        <button
                            id="resetControls"
                            type="button"
                            class="btn btn-outline-secondary"
                            disabled
                        >
                            Reset
                        </button>
                    </div>
                </div>
            </section>

            <section class="results-panel p-3 p-md-4">
                <div
                    class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-4"
                >
                    <h2 class="h4 mb-0">Catalog Results</h2>
                    <p id="resultsCount" class="results-count mb-0">0 items</p>
                </div>
                <div id="catalogGrid" class="row g-3 g-md-4"></div>
            </section>
        </main>

        <footer class="site-footer">
            <div class="container text-center py-3">
                <p class="mb-1">CMPT 272 - Assignment 2 (JavaScript + CSV)</p>
                <p class="mb-0">2026 James Hoang</p>
            </div>
        </footer>

        <div
            class="modal fade"
            id="detailModal"
            tabindex="-1"
            aria-labelledby="detailModalLabel"
            aria-hidden="true"
        >
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <div>
                            <h2
                                class="modal-title h4 mb-1"
                                id="detailModalLabel"
                            >
                                Item details
                            </h2>
                            <p class="text-muted mb-0" id="detailSubtitle"></p>
                        </div>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <p id="detailDescription" class="mb-4"></p>
                        <dl class="row gy-2 mb-0">
                            <dt class="col-sm-3">Type</dt>
                            <dd class="col-sm-9" id="detailType"></dd>
                            <dt class="col-sm-3">Author</dt>
                            <dd class="col-sm-9" id="detailAuthor"></dd>
                            <dt class="col-sm-3">Year</dt>
                            <dd class="col-sm-9" id="detailYear"></dd>
                            <dt class="col-sm-3">Genre</dt>
                            <dd class="col-sm-9" id="detailGenre"></dd>
                            <dt class="col-sm-3">Rating</dt>
                            <dd class="col-sm-9" id="detailRating"></dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="js/app.js"></script>
    </body>
</html>
